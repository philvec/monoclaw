llm:
  base_url: "http://localhost:8080/v1"   # llama.cpp server --port 8080
  max_tokens: 4096                         # safety cap; without this the API defaults to full remaining context

signal:
  api_url: "http://localhost:8081"        # signal-cli REST API
  phone_number: "+15550001234"            # bot's registered Signal number
  allowed_numbers:                        # whitelist — empty = allow all
    - "+15559998888"
  poll_interval: 2.0                      # seconds between GET /v1/receive

tools:
  brave_api_key: ""                       # Brave Search API key (get one at brave.com/search/api)
  exec_timeout_max_s: 600        # hard ceiling on shell command duration
